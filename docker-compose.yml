services:
  postgres:
    image: postgres:17-alpine
    container_name: swifterp-postgres
    environment:
      POSTGRES_USER: swifterp
      POSTGRES_PASSWORD: "SwiftERP_Local_2026!"
      POSTGRES_DB: SwiftErpDb
    ports:
      - "5433:5432"
    volumes:
      - swifterp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swifterp -d SwiftErpDb"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: swifterp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  swifterp-postgres-data:
