services:
  - type: web
    name: swifterp-api
    runtime: docker
    dockerfilePath: ./src/SwiftERP.Api/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Render's free Postgres is one-per-account, and that slot's already used elsewhere, so
      # this points at an external Postgres instead (e.g. Neon's free tier). Npgsql accepts a
      # standard postgresql://user:pass@host/db?sslmode=require URL directly — no reformatting.
      - key: ConnectionStrings__SwiftErpDb
        sync: false # paste the Neon (or other external Postgres) connection string here
      # Optional — Render has no free managed Redis. Leave this blank to deploy without it (the
      # dashboard falls back to an in-memory cache and live notifications are simply disabled);
      # paste a free Upstash/Redis Cloud connection string here later to enable them, no code
      # changes needed either way. Accepts a rediss:// URI or StackExchange.Redis's native format.
      - key: ConnectionStrings__Redis
        sync: false
      - key: Jwt__SigningKey
        generateValue: true
      - key: Jwt__Issuer
        value: SwiftERP
      - key: Jwt__Audience
        value: SwiftERP
      - key: Jwt__ExpiryMinutes
        value: "120"
      - key: Cors__AllowedOrigins__0
        sync: false # set to the deployed frontend's actual URL once it exists

  - type: web
    name: swifterp-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false # set to the deployed swifterp-api service's URL
    routes:
      # HashRouter means every real route lives after a # fragment the server never sees, so
      # every path just needs to serve index.html and let the client-side router take over.
      - type: rewrite
        source: /*
        destination: /index.html
