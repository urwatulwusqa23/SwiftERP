databases:
  - name: swifterp-db
    plan: free
    postgresMajorVersion: "17"

services:
  - type: web
    name: swifterp-api
    runtime: docker
    dockerfilePath: ./src/SwiftERP.Api/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__SwiftErpDb
        fromDatabase:
          name: swifterp-db
          property: connectionString
      # Render's managed Postgres connection string is libpq/psql-style (postgresql://...),
      # which Npgsql also accepts directly — no reformatting needed.
      - key: ConnectionStrings__Redis
        sync: false # fill in manually — see the Redis note in the deployment README section
      - key: Jwt__SigningKey
        generateValue: true
      - key: Jwt__Issuer
        value: SwiftERP
      - key: Jwt__Audience
        value: SwiftERP
      - key: Jwt__ExpiryMinutes
        value: "120"
      - key: Cors__AllowedOrigins__0
        sync: false # set to the deployed frontend's actual URL once it exists

  - type: web
    name: swifterp-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false # set to the deployed swifterp-api service's URL
    routes:
      # HashRouter means every real route lives after a # fragment the server never sees, so
      # every path just needs to serve index.html and let the client-side router take over.
      - type: rewrite
        source: /*
        destination: /index.html
